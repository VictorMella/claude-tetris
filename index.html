<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <button id="theme-toggle" class="theme-toggle">
      <span class="toggle-icon">&#9790;</span>
      <span class="toggle-label">LIGHT</span>
    </button>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay start">
      <div class="overlay-box">
        <p id="overlay-title">TETRIS</p>
        <p id="overlay-score"></p>

        <div class="leaderboard-panel">
          <div class="leaderboard-stats">
            <span class="stat">
              <span class="stat-label">Mejor combo</span>
              <span class="stat-value" id="best-combo-value">0</span>
            </span>
            <span class="stat">
              <span class="stat-label">Máx. líneas</span>
              <span class="stat-value" id="max-lines-value">0</span>
            </span>
          </div>
          <ol id="leaderboard-list" class="leaderboard-list"></ol>
        </div>

        <div id="save-score-row" class="save-score-row">
          <input type="text" id="name-input" maxlength="12" placeholder="TU NOMBRE" autocomplete="off" />
          <button id="save-score-btn">Guardar</button>
        </div>

        <button id="restart-btn">Reiniciar</button>
        <button id="play-btn">JUGAR</button>
        <button id="reset-records-btn" class="reset-records-btn">Reset records</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
